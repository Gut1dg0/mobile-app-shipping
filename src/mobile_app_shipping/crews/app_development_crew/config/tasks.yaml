development_task:
  description: >
    Develop the necessary code to have an mvp of a mobile app. To develop the code,
    have a look at the document containing the app's design, features and requirements
    located on the app_design document. Develop the code having in mind that it will
    be tested in an Expo-managed environment, therefore, the packages used in the project
    should be compatible with Expo and the project shouldn't have an ios or android
    folder or any code or configurations for a bare react native project.
  expected_output: >
    A single, unified txt document containing all the code for the mvp of an Expo-managed
    mobile app project.
  agent: mobile_developer

qa_task:
  description: >
    Review the code generated by the mobile_developer and spot any issues or bugs.
    If the code contains issues or bugs, generate a full report so the mobile_developer
    can work on fixing them. Otherwise, if the code is good, let the mobile_developer
    know so he can finish the project.

    The report generated when the code has issues should contain a list of the bugs or
    issues found and then a list of ways to solve them.
  expected_output: >
    A fully fledged report with the bugs or issues found on the code provided by the mobile_developer.
    Or a congrats message letting the mobile_developer know that the code is great and the project is
    ready to be tested on a mobile device.
  agent: qa_engineer

packaging_task:
  description: >
    You have two options:

    - If you receive a report from the qa_engineer perform steps 1 and 2.
    - If you receive a congrats message from the qa_engineer just perform step 2.

    1.Work on solving any issue or bug outlined on the report.
    Fix any necessary code to have an mvp of the mobile app. Remember that the code will
    be tested in an Expo-managed environment, therefore, the packages used in the project
    should be compatible with Expo and the project shouldn't have an ios or android
    folder or any code or configurations for a bare react native project.

    2.The code you generated is pretty good and you can go ahead and turn the code into a fully functional project
    structured to be tested in an Expo environment. You should structure the project with all
    necessary folders and files. Compress the project into a zip file. Also provide a txt file
    outlining any requirements to test the project in my Expo environment (packages to be installed,
    api keys to get, etc.)

  expected_output: >
    Both a zip file containing the whole mobile app project ready to be uncompressed and tested on an
    Expo environment and a txt file outlining the requirements to test the app on my devices.
  agent: mobile_developer
