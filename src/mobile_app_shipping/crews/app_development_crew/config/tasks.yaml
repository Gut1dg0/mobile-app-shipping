development_task:
  description: >
    Develop a complete, runnable Flutter MVP project based on the app design document.
    Use the file_read_tool to read `app_design.md` before writing any code.

    You must produce ALL of the following files:

    1. pubspec.yaml — valid Flutter pubspec with:
       - name (snake_case, no spaces), description, version: 1.0.0+1
       - environment: sdk: '>=3.0.0 <4.0.0'
       - All dependencies needed (e.g. provider, go_router, http, shared_preferences)
       - flutter: uses-material-design: true

    2. lib/main.dart — entry point calling runApp()

    3. lib/screens/ — one .dart file per screen (home, login, profile, settings at minimum)

    4. lib/widgets/ — reusable widget files if needed

    For EACH file, wrap its content using this EXACT delimiter format with no deviation:

    === FILE: pubspec.yaml ===
    <full file content here>
    === END FILE ===

    === FILE: lib/main.dart ===
    <full file content here>
    === END FILE ===

    Rules:
    - All Dart code must be null-safe (sound null safety).
    - Do not use deprecated APIs.
    - Every import must reference a package that is declared in pubspec.yaml or is part of Flutter/Dart core.
    - No placeholder comments like "// TODO" — implement every function fully.
    - Navigation must work between all screens.

  expected_output: >
    All Flutter project files wrapped in === FILE: <path> === / === END FILE === delimiters.
    Every file must be complete — no truncation, no ellipsis, no "add more code here" placeholders.
  agent: mobile_developer

qa_task:
  description: >
    Review all the Flutter project files produced by the mobile_developer.

    Check specifically for:
    - pubspec.yaml syntax errors or missing/incompatible dependencies
    - Missing or incorrect Dart imports
    - Null safety violations
    - Widget build() methods that return null or are incomplete
    - Navigation routes that are defined but never connected, or referenced but not defined
    - Any compilation-blocking issues

    If you find issues, produce a detailed report with:
    - The file name
    - The specific problem
    - The exact fix (show the corrected code snippet)

    If the code is clean and would compile successfully, say "LGTM — code is ready for delivery."

  expected_output: >
    Either a detailed bug report listing every issue with its exact fix,
    or "LGTM — code is ready for delivery." if no issues were found.
  agent: qa_engineer

refactoring_task:
  description: >
    The qa_engineer has found issues in the Flutter project code. Fix every issue listed in
    the QA report.

    After fixing, re-emit ALL project files using the exact same delimiter format:

    === FILE: <relative path> ===
    <full file content>
    === END FILE ===

    Do not omit any files — include both fixed files and unchanged files.
    All Dart code must be null-safe and complete with no TODOs or placeholders.

  expected_output: >
    All Flutter project files (fixed) wrapped in === FILE: <path> === / === END FILE === delimiters.
  agent: mobile_developer

document_task:
  description: >
    You will receive Flutter project code from the mobile_developer (either original or refactored).
    Your job is to write ALL of it into a markdown file with perfect fidelity.

    Format the output using EXACTLY this delimiter pattern for each file:

    === FILE: pubspec.yaml ===
    <complete file content>
    === END FILE ===

    === FILE: lib/main.dart ===
    <complete file content>
    === END FILE ===

    ...and so on for every file.

    Rules:
    - Do NOT add any text, commentary, or explanation outside the delimiters.
    - Do NOT truncate or summarize any file content.
    - Copy every character of every file exactly as provided.
    - The output must contain every file that was produced by the mobile_developer.

  expected_output: >
    A markdown file containing all Flutter project files, each wrapped in
    === FILE: <path> === / === END FILE === delimiters, with zero omissions or alterations.
  agent: document_specialist
