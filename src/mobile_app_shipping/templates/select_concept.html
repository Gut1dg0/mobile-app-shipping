<!DOCTYPE html>
<html>
  <head>
    <title>Select App Concept</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; background: #fafafa; }
      form { background: white; padding: 20px; border-radius: 8px;
             max-width: 600px; margin: auto; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
      h1 { text-align: center; }
      label { display: block; margin: 10px 0; }
      button { margin-top: 15px; padding: 10px 20px; background: #007BFF;
               color: white; border: none; border-radius: 5px; cursor: pointer; }
      button:hover { background: #0056b3; }
    </style>
  </head>
  <body>
    <h1>Choose the Best App Concept</h1>
    <form method="POST" action="/select">
      {% for concept in concepts %}
        <div style="margin-bottom:15px;">
          <input type="radio" name="concept" value="{{ loop.index0 }}" required>
          <label><strong>{{ loop.index }}.</strong> {{ concept }}</label>
        </div>
      {% endfor %}
      <button type="submit">Submit Selection</button>
    </form>
  </body>
</html>
