<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose an App Concept</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --border: #252a36;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf0;
      --muted: #8891a4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
    }

    .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 48px;
    }

    form { width: 100%; max-width: 760px; }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }
    .card:hover { border-color: var(--accent); }
    .card.selected { border-color: var(--accent); background: rgba(108,99,255,0.07); }

    .card input[type="radio"] { display: none; }

    .card-num {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .card.selected .card-num { background: var(--accent); }

    .card-text { font-size: 0.97rem; line-height: 1.65; }

    button[type="submit"] {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.2px;
    }
    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="eyebrow">Step 2 of 4 — Human in the Loop</div>
  <h1>Choose Your App Concept</h1>
  <p class="subtitle">The AI researched trending opportunities and generated 3 concepts. Pick the one you want to build.</p>

  <form method="POST" action="/select" onsubmit="handleSubmit(this)">
    <div class="cards">
      {% for concept in concepts %}
      <label class="card" id="card-{{ loop.index0 }}" onclick="selectCard({{ loop.index0 }})">
        <input type="radio" name="concept" value="{{ loop.index0 }}" {% if loop.first %}checked{% endif %}>
        <div class="card-num">{{ loop.index }}</div>
        <div class="card-text">{{ concept }}</div>
      </label>
      {% endfor %}
    </div>
    <button type="submit" id="submit-btn">Build this app &#8594;</button>
  </form>

  <script>
    // highlight first card by default
    document.getElementById('card-0')?.classList.add('selected');

    function selectCard(idx) {
      document.querySelectorAll('.card').forEach((c, i) => {
        c.classList.toggle('selected', i === idx);
        c.querySelector('input[type=radio]').checked = (i === idx);
      });
    }

    function handleSubmit(form) {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Launching design crew…';
    }
  </script>
</body>
</html>
