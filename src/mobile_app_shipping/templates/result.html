<!DOCTYPE html>
<html>
  <head>
    <title>App Results</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
      pre { white-space: pre-wrap; background: white; padding: 20px;
            border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
      h1, h2 { color: #333; }
    </style>
  </head>
  <body>
    <h1>Selected Concept:</h1>
    <p><strong>{{ concept }}</strong></p>
    <hr>
    <h2>Crew 2 (Design) Result:</h2>
    <pre>{{ design_result }}</pre>
    <hr>
    <h2>Crew 3 (Development) Result:</h2>
    <pre>{{ dev_result }}</pre>
  </body>
</html>
