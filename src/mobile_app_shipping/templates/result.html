<!DOCTYPE html>

    <title>App Results</title>
    <style>
      body {

        color: #222;
        text-align: center;
      }
      p {
        max-width: 800px;

      }
      .gallery {
        display: flex;
        justify-content: center;

        text-align: center;
        margin-top: 40px;
      }
      .downloads a {
        display: inline-block;
        margin: 10px;
        padding: 10px 20px;
        background: #007BFF;
        color: white;

      }

  <body>

    <h1>{{ concept }}</h1>

    <h2>Design Gallery</h2>

    <h2>Download Your Files</h2>
